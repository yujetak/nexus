apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextjs
  template:
    metadata:
      labels:
        app: nextjs
    spec:
      containers:
        - name: nextjs
          image: yuje123/my-nextjs
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secret
          env:
            - name: NEXT_PUBLIC_SPRING_URL
              value: "http://spring:8080"
            - name: NEXT_PUBLIC_FASTAPI_URL
              value: "http://fastapi:8000"

---
apiVersion: v1
kind: Service
metadata:
  name: nextjs
spec:
  type: NodePort
  selector:
    app: nextjs
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30002
